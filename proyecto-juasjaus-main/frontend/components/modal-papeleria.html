<!-- MODAL DE PAPELERÍA (NUEVO DISEÑO STITCH) -->
    <div class="fixed inset-0 z-[10000] flex items-center justify-center hidden bg-slate-900/50 backdrop-blur-sm p-4" id="modalPapeleria" style="display: none;">
        <!-- Modal Container -->
        <div class="bg-background-light dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <!-- Header with Red Gradient -->
            <header class="bg-gradient-to-r from-primary to-red-700 px-6 py-4 flex items-center justify-between shadow-md">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-white text-2xl">upload_file</span>
                    <h2 class="text-white text-xl font-bold tracking-tight">Subir Papelería</h2>
                </div>
                <button class="text-white/80 hover:text-white transition-colors p-1 hover:bg-white/10 rounded-lg" onclick="cerrarModalPapeleria()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </header>
            
            <!-- Modal Body (Scrollable) -->
            <div class="overflow-y-auto p-6 space-y-8">
                <form id="formPapeleria">
                    <!-- Section: Datos del Alumno -->
                    <section class="space-y-4 mb-8">
                        <div class="flex items-center gap-2 border-b border-primary/10 pb-2">
                            <span class="material-symbols-outlined text-primary">person</span>
                            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Datos del Alumno</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Nombre Completo *</label>
                                <input id="nombreAlumno" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Ej. Juan Pérez García" type="text"/>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Matrícula *</label>
                                <input id="matriculaAlumno" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Número de control" type="text"/>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Grado y Grupo *</label>
                                <input id="gradoGrupo" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Ej. 4to A - Programación" type="text"/>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Teléfono</label>
                                <input id="telefonoAlumno" class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="10 dígitos" type="tel"/>
                            </div>
                        </div>
                    </section>
                    
                    <!-- Section: Datos del Tutor -->
                    <section class="space-y-4 mb-8">
                        <div class="flex items-center gap-2 border-b border-primary/10 pb-2">
                            <span class="material-symbols-outlined text-primary">family_restroom</span>
                            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Datos del Tutor</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1 md:col-span-2">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Nombre del Tutor *</label>
                                <input id="nombrePadre" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Nombre completo del responsable" type="text"/>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Parentesco *</label>
                                <select id="parentesco" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary">
                                    <option value="">Seleccionar...</option>
                                    <option value="Padre">Padre</option>
                                    <option value="Madre">Madre</option>
                                    <option value="Tutor">Tutor Legal</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Teléfono Tutor *</label>
                                <input id="telefonoPadre" required class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" type="tel" placeholder="10 dígitos"/>
                            </div>
                            <div class="flex flex-col gap-1 md:col-span-2">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Correo Electrónico</label>
                                <input id="emailPadre" class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="ejemplo@correo.com" type="email"/>
                            </div>
                        </div>
                    </section>
                    
                    <!-- Section: Documentos -->
                    <section class="space-y-4 mb-8">
                        <div class="flex items-center gap-2 border-b border-primary/10 pb-2">
                            <span class="material-symbols-outlined text-primary">cloud_upload</span>
                            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Carga de Documentos</h3>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Tipo de Documento *</label>
                            <select id="tipoDocumento" required onchange="mostrarCampoOtro()" class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary">
                                <option value="">Seleccione el tipo de trámite</option>
                                <option value="Inscripción">Inscripción</option>
                                <option value="Reinscripción">Reinscripción</option>
                                <option value="Beca">Solicitud de Beca</option>
                                <option value="Constancia">Constancia de Estudios</option>
                                <option value="Otro">Otro Documento</option>
                            </select>
                        </div>
                        
                        <div class="flex flex-col gap-1 mt-2" id="campoOtro" style="display: none;">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Especificar Documento *</label>
                            <input id="otroDocumento" class="rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Ej. Constancia de buena conducta" type="text"/>
                        </div>

                        <!-- Drag & Drop Zone -->
                        <div id="uploadZone" class="border-2 border-dashed border-primary/30 bg-primary/5 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-primary/10 transition-colors group mt-4">
                            <input type="file" id="archivosInput" multiple accept="image/*,.pdf,.doc,.docx" style="display: none;">
                            <span class="material-symbols-outlined text-5xl text-primary/60 group-hover:scale-110 transition-transform mb-3">file_upload</span>
                            <p class="text-slate-900 dark:text-slate-100 font-medium font-display">Arrastra tus archivos aquí o haz clic para buscar</p>
                            <p class="text-xs text-slate-500 mt-2">Formatos: PDF, JPG, PNG, DOCX (Máx. 5MB c/u)</p>
                            
                            <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 bg-white dark:bg-slate-800 rounded-full border border-slate-200 dark:border-slate-700 text-xs font-semibold text-slate-600 dark:text-slate-400">
                                <span class="material-symbols-outlined text-sm">attachment</span>
                                <span id="contadorArchivos">0 / 10 archivos seleccionados</span>
                            </div>
                        </div>
                        
                        <!-- Archivos Lista Container -->
                        <div id="archivosLista" class="mt-4 space-y-2"></div>
                    </section>
                    
                    <!-- Section: Observaciones -->
                    <section class="space-y-2 mb-8">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Observaciones adicionales</label>
                        <textarea id="observaciones" class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary" placeholder="Escribe aquí cualquier aclaración sobre los documentos..." rows="3"></textarea>
                    </section>

                    <!-- Sticky Footer (Inlined inside body because of max-height container) -->
                    <div class="border-t border-slate-200 dark:border-slate-800 pt-6 flex flex-col sm:flex-row justify-end gap-3 pb-2">
                        <button type="button" class="px-6 py-2.5 rounded-lg font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" onclick="cerrarModalPapeleria()">
                            Cancelar
                        </button>
                        <button type="submit" class="px-8 py-2.5 rounded-lg font-semibold bg-primary text-white hover:bg-red-700 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-lg">send</span>
                            Enviar Documentos
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
