version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app:ro
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend-react/Dockerfile
    ports:
      - "5502:80"

# Nota: opcionalmente puedes añadir una base de datos aquí. Actualmente el proyecto usa SQLite por defecto.

volumes: {}
