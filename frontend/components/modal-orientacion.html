<div id="modalOrientacion" class="fixed inset-0 z-[1001] flex items-center justify-center hidden bg-black/60 backdrop-blur-sm p-4">
    <div class="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-primary/10 flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-teal-600 to-teal-800 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/20 rounded-lg">
                    <span class="material-symbols-outlined text-white">psychology</span>
                </div>
                <div>
                    <h2 class="text-white text-lg font-black leading-tight">Orientación Educativa</h2>
                    <p class="text-white/80 text-[11px] font-semibold uppercase tracking-widest">Apoyo Estudiantil</p>
                </div>
            </div>
            <button onclick="cerrarModalOrientacion()" class="p-2 hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined text-white">close</span>
            </button>
        </header>

        <!-- Tabs Navigation -->
        <nav class="flex border-b border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50">
            <button onclick="cambiarTabOrientacion('reporte')" class="tab-orientacion flex-1 py-3 text-sm font-bold border-b-2 border-teal-600 text-teal-600 transition-all hover:bg-teal-50 dark:hover:bg-teal-900/20" id="tab-reporte">Reportes</button>
            <button onclick="cambiarTabOrientacion('queja')" class="tab-orientacion flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 transition-all hover:bg-teal-50 dark:hover:bg-teal-900/20" id="tab-queja">Quejas</button>
            <button onclick="cambiarTabOrientacion('cita')" class="tab-orientacion flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 transition-all hover:bg-teal-50 dark:hover:bg-teal-900/20" id="tab-cita">Citas</button>
            <button onclick="cambiarTabOrientacion('buzon')" class="tab-orientacion flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 transition-all hover:bg-teal-50 dark:hover:bg-teal-900/20" id="tab-buzon">Buzón</button>
        </nav>

        <!-- Body sections -->
        <div class="overflow-y-auto flex-1 p-6">
            
            <!-- SECCIÓN: REPORTE -->
            <div id="seccion-reporte" class="seccion-orientacion space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Enviar un Reporte de Incidente</h3>
                <div class="space-y-3">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">Descripción del incidente</label>
                        <textarea id="reporte-texto" rows="4" placeholder="Describe lo ocurrido detalladamente..." class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all"></textarea>
                    </div>
                    <button onclick="enviarOrientacion('reporte')" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl shadow-lg hover:bg-teal-700 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">send</span>
                        Enviar Reporte
                    </button>
                </div>
            </div>

            <!-- SECCIÓN: QUEJA -->
            <div id="seccion-queja" class="seccion-orientacion space-y-4 hidden">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Presentar una Queja</h3>
                <div class="space-y-3">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">Tipo de queja</label>
                        <select id="queja-tipo" class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all">
                            <option value="">Selecciona una opción...</option>
                            <option value="Acoso escolar (Bullying)">Acoso escolar (Bullying)</option>
                            <option value="Mal trato de trabajador">Mal trato de trabajador</option>
                            <option value="Instalaciones en mal estado">Instalaciones en mal estado</option>
                            <option value="Inconformidad académica">Inconformidad académica</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">Detalles adicionales</label>
                        <textarea id="queja-texto" rows="3" placeholder="Proporciona más detalles..." class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all"></textarea>
                    </div>
                    <button onclick="enviarOrientacion('queja')" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl shadow-lg hover:bg-teal-700 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">flag</span>
                        Enviar Queja
                    </button>
                </div>
            </div>

            <!-- SECCIÓN: CITA -->
            <div id="seccion-cita" class="seccion-orientacion space-y-4 hidden">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Solicitar Cita con Psicólogo</h3>
                <div class="space-y-3">
                    <p class="text-xs text-slate-500 leading-relaxed italic border-l-4 border-teal-500 pl-3">Tu información será tratada con absoluta confidencialidad.</p>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">Motivo de la cita</label>
                        <input type="text" id="cita-motivo" placeholder="Ej: Apoyo emocional, problemas académicos..." class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">Horario preferido</label>
                        <select id="cita-horario" class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all">
                            <option value="Turno Matutino (7:00 AM - 1:00 PM)">Turno Matutino (7:00 AM - 1:00 PM)</option>
                            <option value="Turno Vespertino (1:00 PM - 7:00 PM)">Turno Vespertino (1:00 PM - 7:00 PM)</option>
                        </select>
                    </div>
                    <button onclick="enviarOrientacion('cita')" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl shadow-lg hover:bg-teal-700 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">event</span>
                        Solicitar Cita
                    </button>
                </div>
            </div>

            <!-- SECCIÓN: BUZÓN -->
            <div id="seccion-buzon" class="seccion-orientacion space-y-4 hidden">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Buzón de Sugerencias</h3>
                <div class="space-y-3">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-600">¿Tienes alguna sugerencia para mejorar el plantel?</label>
                        <textarea id="buzon-texto" rows="4" placeholder="Tus comentarios son muy valiosos para nosotros..." class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500/40 outline-none transition-all"></textarea>
                    </div>
                    <button onclick="enviarOrientacion('buzon')" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl shadow-lg hover:bg-teal-700 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">mail</span>
                        Enviar al Buzon
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
