<div class="modal-informacion" id="modalInformacion">
    <div class="modal-informacion-content">
        <header class="bg-gradient-to-r from-primary to-red-800 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <img src="../imgs/yameharte.png" alt="CBTis 258" class="h-9 w-auto object-contain">
                <div>
                    <h2 class="text-white text-lg font-black leading-tight">CBTis 258</h2>
                    <p class="text-white/80 text-[11px] font-semibold uppercase tracking-widest">Información General</p>
                </div>
            </div>
            <button onclick="cerrarInformacion()" class="p-2 hover:bg-white/20 rounded-full transition-colors">
                <span class="material-symbols-outlined text-white">close</span>
            </button>
        </header>

        <div class="info-grid">
            <div class="info-card-section" onclick="abrirSeccion('nuevoIngreso')">
                <div class="info-icon">🎓</div>
                <h3>Nuevo Ingreso</h3>
                <p>Proceso de inscripción y requisitos</p>
            </div>

            <div class="info-card-section" onclick="abrirSeccion('becas')">
                <div class="info-icon">💰</div>
                <h3>Becas y Apoyos</h3>
                <p>Información sobre becas disponibles</p>
            </div>

            <div class="info-card-section" onclick="abrirSeccion('contacto')">
                <div class="info-icon">📞</div>
                <h3>Contacto</h3>
                <p>Teléfonos y correos importantes</p>
            </div>

            <div class="info-card-section" onclick="abrirSeccion('faq')">
                <div class="info-icon">❓</div>
                <h3>Preguntas Frecuentes</h3>
                <p>Dudas comunes resueltas</p>
            </div>
        </div>
    </div>
</div>
