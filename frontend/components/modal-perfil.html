<!-- Profile Modal Overlay -->
<div id="modalPerfil" class="fixed inset-0 z-[1001] flex items-center justify-center hidden bg-black/60 backdrop-blur-sm">
<!-- Profile Modal Container -->
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-primary/10 mx-4 max-h-[90vh] flex flex-col">

    <!-- Header con degradado rojo + Logo CBTis -->
    <header class="bg-gradient-to-r from-primary to-red-800 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <img src="../imgs/yameharte.png" alt="CBTis 258" class="h-9 w-auto object-contain">
            <div>
                <h2 class="text-white text-lg font-black leading-tight">CBTis 258</h2>
                <p class="text-white/80 text-[11px] font-semibold uppercase tracking-widest">Mi Perfil</p>
            </div>
        </div>
        <button onclick="document.getElementById('modalPerfil').classList.add('hidden')" class="p-2 hover:bg-white/20 rounded-full transition-colors">
            <span class="material-symbols-outlined text-white">close</span>
        </button>
    </header>

    <!-- Scrollable body -->
    <div class="overflow-y-auto flex-1">
        <!-- Profile Photo Section -->
        <div class="p-8 pb-4 flex flex-col items-center">
            <div class="relative">
                <div class="size-32 rounded-full border-4 border-primary/20 p-1 bg-white dark:bg-slate-800 shadow-xl overflow-hidden cursor-pointer" onclick="document.getElementById('profilePhotoInput').click()" title="Cambiar foto">
                    <div id="profilePhotoPreview" class="w-full h-full rounded-full bg-center bg-no-repeat bg-cover bg-slate-200" style="background-image: url('https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y');"></div>
                </div>
                <!-- Input oculto para subir foto -->
                <input type="file" id="profilePhotoInput" accept="image/*" style="display:none;" onchange="cambiarFotoPerfil(event)">
                <!-- Badge botón cambiar foto -->
                <button onclick="document.getElementById('profilePhotoInput').click()" class="absolute bottom-1 right-1 bg-primary text-white size-9 rounded-full shadow-lg hover:scale-110 transition-transform flex items-center justify-center border-3 border-white dark:border-slate-900" title="Cambiar foto">
                    <span class="material-symbols-outlined text-lg">photo_camera</span>
                </button>
            </div>
            <div class="mt-4 text-center">
                <h1 class="text-xl font-bold text-slate-900 dark:text-white" id="modal-perfil-nombre">—</h1>
                <p class="text-primary font-semibold text-sm mt-0.5" id="modal-perfil-rol">—</p>
            </div>
        </div>

        <!-- Details Section (read-only display) -->
        <div class="px-6 pb-2 space-y-2">
            <h3 class="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-1 pb-1">Información de la Cuenta</h3>
            <!-- Nombre -->
            <div class="flex items-center gap-3 p-3 bg-primary/5 rounded-xl border border-transparent">
                <div class="size-9 rounded-lg bg-primary text-white flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[18px]">person</span>
                </div>
                <div class="flex flex-col min-w-0">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Nombre</span>
                    <span class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate" id="modal-perfil-nombre-completo">—</span>
                </div>
            </div>
            <!-- Email -->
            <div class="flex items-center gap-3 p-3 bg-primary/5 rounded-xl border border-transparent">
                <div class="size-9 rounded-lg bg-primary text-white flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[18px]">mail</span>
                </div>
                <div class="flex flex-col min-w-0">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Correo</span>
                    <span class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate" id="modal-perfil-email">—</span>
                </div>
            </div>
            <!-- Rol -->
            <div class="flex items-center gap-3 p-3 bg-primary/5 rounded-xl border border-transparent">
                <div class="size-9 rounded-lg bg-primary text-white flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[18px]">badge</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Rol</span>
                    <span class="text-sm font-medium capitalize text-slate-900 dark:text-slate-100" id="modal-perfil-rol-detalle">—</span>
                </div>
            </div>
            <!-- Semestre (solo si es estudiante) -->
            <div class="flex items-center gap-3 p-3 bg-primary/5 rounded-xl border border-transparent" id="fila-semestre">
                <div class="size-9 rounded-lg bg-primary text-white flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[18px]">calendar_today</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Semestre</span>
                    <span class="text-sm font-medium text-slate-900 dark:text-slate-100" id="modal-perfil-semestre">—</span>
                </div>
            </div>
        </div>

        <!-- Edit Section -->
        <div class="px-6 pb-6 pt-3 space-y-3">
            <h3 class="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-1 pb-1">Actualizar Datos</h3>
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-600 dark:text-slate-400">Nombre completo</label>
                <input id="input-perfil-nombre" type="text" placeholder="Tu nombre completo" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-3 py-2 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all">
            </div>
            <div class="flex flex-col gap-1.5" id="editar-rol-container">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold text-slate-600 dark:text-slate-400">Rol</label>
                    <span id="badge-cambios-rol" class="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500">3 cambios restantes</span>
                </div>
                <select id="input-perfil-rol" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-3 py-2 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all">
                    <option value="estudiante">Estudiante</option>
                    <option value="administrador">Administrador</option>
                    <option value="prefecto">Prefecto</option>
                    <option value="orientador">Orientador</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5" id="editar-semestre-container">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold text-slate-600 dark:text-slate-400">Semestre</label>
                    <span id="badge-cambios-semestre" class="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500">10 cambios restantes</span>
                </div>
                <select id="input-perfil-semestre" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-3 py-2 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all">
                    <option value="">Seleccionar...</option>
                    <option value="1">1er Semestre</option>
                    <option value="2">2do Semestre</option>
                    <option value="3">3er Semestre</option>
                    <option value="4">4to Semestre</option>
                    <option value="5">5to Semestre</option>
                    <option value="6">6to Semestre</option>
                </select>
            </div>
            <!-- Save Feedback -->
            <p id="perfil-guardado-msg" class="text-green-600 text-xs font-semibold text-center hidden">✅ Perfil actualizado correctamente.</p>
        </div>
    </div>

    <!-- Footer Actions -->
    <div class="bg-slate-50 dark:bg-slate-800/50 px-6 py-4 flex flex-col gap-2 shrink-0 border-t border-slate-100 dark:border-slate-800">
        <button onclick="actualizarPerfil()" class="w-full py-3 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-red-700 transition-all active:scale-95 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-lg">save</span>
            Actualizar Información
        </button>
    </div>

</div>
</div>
