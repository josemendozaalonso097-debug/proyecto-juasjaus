version: '3.8'

# Development override: mounts code as volumes and runs dev servers where appropriate
services:
  backend:
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend-react:/app
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host --port 5502"]
    ports:
      - "5502:5502"
    environment:
      - CHOKIDAR_USEPOLLING=true
